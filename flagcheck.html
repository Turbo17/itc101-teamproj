<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flag Checker</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: #0a0f1c;
      color: #e6f1ff;
    }

    .a1 {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .b2 {
      background-color: #11203a;
      padding: 2rem;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      transition: box-shadow 0.5s ease;
    }

    .b2.glow {
      box-shadow: 0 0 25px 8px #50fa7b;
    }

    .b2 h2 {
      color: #76c7c0;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.5rem;
      margin: 0.5rem 0;
      border: none;
      border-radius: 6px;
      background-color: #1a2a40;
      color: #e6f1ff;
    }

    button {
      width: 100%;
      padding: 0.5rem;
      background-color: #50fa7b;
      color: #0a0f1c;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
    }

    #d7 {
      margin-top: 1rem;
      font-weight: bold;
    }

    #d7.alpha {
      color: #50fa7b;
    }

    #d7.beta {
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="a1">
    <div class="b2" id="flagBox">
      <h2>Flag Checker</h2>
      <input type="text" id="x3" placeholder="Enter your flag" />
      <button onclick="pencil()">Check</button>
      <div id="d7"></div>
    </div>
  </div>

  <!-- Confetti script -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    const elephant = [
  125, 115, 116, 97, 111, 95, 102, 111, 95, 122, 
  101, 104, 99, 110, 117, 98, 95, 121, 101, 110, 
  111, 104, 123, 102, 116, 99
];

const candle = Array.from({ length: elephant.length }, (_, i) => elephant.length - 1 - i);

function bucket(q, r) {
  return r.map(i => q[i]).map(x => String.fromCharCode(x)).join('');
}

function pencil() {
  const car_keys = document.getElementById("x3").value.trim();
  const fork = document.getElementById("d7");
  const flagBox = document.getElementById("flagBox");
  const light = bucket(elephant, candle);

  if (car_keys === light) {
    fork.textContent = "✔️ Correct Flag!";
    fork.className = "alpha";
    flagBox.classList.add("glow");

    const button = document.querySelector("button");
    const rect = button.getBoundingClientRect();

    confetti({
      origin: {
        x: (rect.left + rect.width / 2) / window.innerWidth,
        y: (rect.top + rect.height / 2) / window.innerHeight
      },
      particleCount: 100,
      spread: 80,
      startVelocity: 45,
      scalar: 1
    });

    setTimeout(() => {
      flagBox.classList.remove("glow");
    }, 3000);

  } else {
    fork.textContent = "❌ Incorrect Flag.";
    fork.className = "beta";
  }
}

    const drawer = "464c41477b46524f475f46414b455f464c41477d";
    const mug = [102, 108, 97, 103, 95, 102, 114, 111, 103];

    function shelf(g) {
      return g.split('').map((c, i) => String.fromCharCode(c.charCodeAt(0) ^ (i % 5))).join('');
    }

    function rug(b) {
      return /^#[0-9A-F]{6}$/i.test(b) && b.length === 7;
    }

    function radio(v) {
      return v.map(b => (b + 42) % 256).filter((_, i) => i % 2 === 0).reverse();
    }

    const curtain = v => {
      let s = "";
      for (let i = 0; i < v.length; i++) {
        s += String.fromCharCode(v.charCodeAt(i) + (i % 3));
      }
      return s.split("").reverse().join("");
    };

    const battery = shelf(drawer);
    const hammer = radio(mug);
  </script>
  <script>
    
  function triggerPunishment() {
      if (Math.random() < 0.5) {
        window.location.href = "https://tinyurl.com/2s4fu32u";
      } else {
        const audio = new Audio("https://turbo17.github.io/itc101-CTF/Clown.mp3");
        audio.play();

        alert("Nice try clown 🤡");

        for (let i = 0; i < 10; i++) {
          spawnBouncingClown();
        }
      }
    }

    setInterval(() => {
      if (window.outerHeight - window.innerHeight > 100) {
        triggerPunishment();
      }
    }, 500);

    document.addEventListener("keydown", e => {
      if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) ||
        (e.ctrlKey && e.key === "U")
      ) {
        e.preventDefault();
        triggerPunishment();
      }
    });

    document.addEventListener("contextmenu", e => {
      e.preventDefault();
      alert("Nice try, I already thought of that.");
    });


      const container = document.createElement("div");
      container.className = "emoji-rain";
      document.body.appendChild(container);

       function spawnBouncingClown() {
      const clown = document.createElement("div");
      clown.className = "emoji";
      clown.textContent = "🤡";
      clown.style.left = Math.random() * window.innerWidth + "px";
      clown.style.top = Math.random() * window.innerHeight + "px";
      document.body.appendChild(clown);

      let x = parseFloat(clown.style.left);
      let y = parseFloat(clown.style.top);
      let dx = (Math.random() * 2 - 1) * 6;
      let dy = (Math.random() * 2 - 1) * 6;

      function animate() {
        x += dx;
        y += dy;

        if (x <= 0 || x >= window.innerWidth - 40) {
          dx = -dx;
          screenShake();
        }
        if (y <= 0 || y >= window.innerHeight - 40) {
          dy = -dy;
          screenShake();
        }

        clown.style.left = x + "px";
        clown.style.top = y + "px";

        requestAnimationFrame(animate);
      }

      animate();
      setTimeout(() => clown.remove(), 5000);
    }


      const bounceLaughs = [];
      for (let i = 0; i < 10; i++) {
        const laugh = document.createElement("div");
        laugh.className = "emoji";
        laugh.textContent = "😂";
        laugh.style.left = Math.random() * 150 + "vw";
        laugh.style.top = Math.random() * 150 + "vh";
        container.appendChild(laugh);
        bounceLaughs.push(laugh);

        let dx = (Math.random() * 2 - 1) * 50;
        let dy = (Math.random() * 2 - 1) * 50;

        const bounceInterval = setInterval(() => {
          const rect = laugh.getBoundingClientRect();
          let x = rect.left + dx;
          let y = rect.top + dy;

          if (x < 0 || x > window.innerWidth - 30) dx = -dx;
          if (y < 0 || y > window.innerHeight - 30) dy = -dy;

          laugh.style.left = x + "px";
          laugh.style.top = y + "px";
        }, 30);

        setTimeout(() => {
          clearInterval(bounceInterval);
          laugh.remove();
        }, 4500);
      }

      setTimeout(() => {
        clearInterval(clownInterval);
        container.remove();
      }, 4500);
    }
  }

    function screenShake() {
      const intensity = 6;
      const duration = 150;
      const start = performance.now();

      function shakeFrame(t) {
        const elapsed = t - start;
        if (elapsed > duration) {
          document.body.style.transform = "";
          return;
        }

        const x = (Math.random() - 0.5) * intensity;
        const y = (Math.random() - 0.5) * intensity;

        document.body.style.transform = `translate(${x}px, ${y}px)`;
        requestAnimationFrame(shakeFrame);
      }

      requestAnimationFrame(shakeFrame);
    }



  setInterval(() => {
    if (window.outerHeight - window.innerHeight > 100) {
      triggerPunishment();
    }
  }, 500);

  document.addEventListener("keydown", function (e) {
    if (
      e.key === "F12" ||
      (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) ||
      (e.ctrlKey && e.key === "U")
    ) {
      e.preventDefault();
      triggerPunishment();
    }
  });

  document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
    alert("Nice try, I already thought of that.");
  });
  </script>
</body>
</html>
